<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz</title>

<style>

body{
font-family:Arial,sans-serif;
display:flex;
margin:0;
transition:background 0.3s,color 0.3s;
}

.dark{
background:#121212;
color:#eee;
}

.sidebar{
width:100px;
background:#fff;
border-right:1px solid #ddd;
padding:10px;
overflow-y:auto;
}

.dark .sidebar{
background:#1e1e1e;
border-color:#444;
}

#palette button{
margin:5px;
width:40px;
height:40px;
border-radius:6px;
border:none;
background:#e0e0e0;
}

.main{
padding:20px;
flex:1;
max-width:900px;
margin:auto;
}

.question{
font-size:1.2em;
margin-bottom:10px;
font-weight:600;
}

.image{
max-width:100%;
margin-bottom:20px;
display:none;
border-radius:8px;
}

.options button{
display:block;
margin:10px 0;
padding:12px;
width:100%;
font-size:1em;
border-radius:8px;
border:1px solid #ddd;
background:#fafafa;
cursor:pointer;
}

.options button:hover{
background:#f0f0f0;
}

.correct{
background:#c8e6c9 !important;
}

.wrong{
background:#ffcdd2 !important;
}

.summary{
margin-top:20px;
padding:10px;
background:#f4f4f4;
border-radius:8px;
}

.dark .summary{
background:#2b2b2b;
}

#toggle-dark{
position:fixed;
top:10px;
right:10px;
}

/* Explanation button */

#show-explanation-btn{
display:none;
margin-top:10px;
background:#2196f3;
color:white;
padding:10px 15px;
border:none;
border-radius:6px;
cursor:pointer;
}

#show-explanation-btn:hover{
background:#1976d2;
}

/* Explanation box */

#explanation-box{
margin-top:20px;
padding:15px;
border-radius:8px;
background:#f5f5f5;
border-left:5px solid #4caf50;
display:none;
max-height:250px;
overflow-y:auto;
}

#explanation-image{
max-width:100%;
margin-bottom:10px;
display:none;
}

</style>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="dark">

<div class="sidebar">

<h4>Palette</h4>

<div id="palette"></div>

</div>

<div class="main">

<div id="question-number"></div>

<div id="question-text" class="question"></div>

<img id="question-image" class="image">

<div id="options" class="options"></div>

<button id="show-explanation-btn">📖 Show Explanation</button>

<div id="explanation-box">

<h3>Explanation</h3>

<img id="explanation-image">

<p id="explanation-text"></p>

</div>

<p id="timer">Time: 0 sec</p>

<button onclick="prevQuestion()">⬅️ Prev</button>
<button onclick="nextQuestion()">Next ➡️</button>
<button onclick="submitQuiz()">✅ Submit Quiz</button>

<button onclick="reviewWrong()">🔁 Review Wrong Questions</button>

<button onclick="resetQuiz()">🔄 Retry</button>
<button onclick="location.href='index.html'">🏠 Home</button>

<div id="result-summary" class="summary"></div>

</div>

<button id="toggle-dark" onclick="toggleDarkMode()">☀️</button>

<script>

if(localStorage.getItem("dark")==="false"){
document.body.classList.remove("dark");
document.getElementById("toggle-dark").textContent="🌙";
}

function toggleDarkMode(){

const isDark=document.body.classList.toggle("dark");

localStorage.setItem("dark",isDark);

document.getElementById("toggle-dark").textContent=isDark?"☀️":"🌙";

}

</script>

<script type="module" src="app.js"></script>

</body>
</html>
