<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>NEET PG / INICET PYQs</title>

<link rel="stylesheet" href="style.css" />

<script defer src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script async src="https://www.googletagmanager.com/gtag/js?id=G-6FZ770H045"></script>

<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-6FZ770H045');
</script>

</head>

<body>

<header>

<h1>NEET PG / INICET PYQs</h1>

<div class="top-buttons">

<div class="top-right">
<span id="user-info">Loading...</span>

<button id="loginBtn" style="display:none">🔐 Login / Sign Up</button>
<button id="logoutBtn" style="display:none">🚪 Logout</button>
</div>

<button id="payBtn">💳 Pay ₹99 to Unlock All Subjects</button>

</div>

</header>

<div class="info-message">

🔓 <strong>Anatomy</strong> is free. Pay ₹99 once to unlock access to all other subjects.<br>
Please login first to make the payment.

</div>

<div id="subject-container" class="subjects"></div>

<div id="visitCounter" class="visit-number"></div>

<a href="https://wa.me/919431328569" target="_blank" id="whatsappBtn" class="whatsapp-btn">
💬 Chat with us on WhatsApp
</a>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
doc,
getDoc,
setDoc,
updateDoc,
increment,
onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyAMNDoNuqkWfXEGYdwueJb5XTr1ST2ztKc",
authDomain: "mcqs-96117.firebaseapp.com",
projectId: "mcqs-96117",
storageBucket: "mcqs-96117.firebasestorage.app",
messagingSenderId: "352256319143",
appId: "1:352256319143:web:74b2bd062a7f2dc5f1c582",
measurementId: "G-6FZ770H045"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const subjects = [
"Anatomy","Physiology","Biochemistry","Pathology","Pharmacology",
"Microbiology","Forensic Medicine","Community Medicine","ENT",
"Ophthalmology","General Medicine","General Surgery",
"Obstetrics & Gynaecology","Pediatrics","Orthopaedics",
"Dermatology","Psychiatry","Radiology","Anesthesiology"
];

let isPaid=false;
let userId=null;
let currentUser=null;

const userInfo=document.getElementById("user-info");
const loginBtn=document.getElementById("loginBtn");
const logoutBtn=document.getElementById("logoutBtn");
const payBtn=document.getElementById("payBtn");

function getRandomColor(){

const colors=[
"#FF5733","#33FF57","#3357FF","#F1C40F","#9B59B6",
"#1ABC9C","#E74C3C","#8E44AD","#3498DB"
];

return colors[Math.floor(Math.random()*colors.length)];

}

async function renderSubjects(){

const container=document.getElementById("subject-container");
container.innerHTML="";

let progressData={};

try{

if(userId){

const snap=await getDoc(doc(db,"user_progress",userId));

if(snap.exists()){
progressData=snap.data();
}

}

}catch(e){

console.log("Progress load skipped",e);

}

subjects.forEach(subject=>{

const card=document.createElement("a");
card.className="card";

const isFree=subject==="Anatomy";
const locked=!isFree && !isPaid;

card.classList.toggle("locked",locked);
card.style.backgroundColor=getRandomColor();

const key=`progress_${subject}`;

let attempted=progressData[key]?.attempted ?? 0;
let correct=progressData[key]?.correct ?? 0;
let wrong=progressData[key]?.wrong ?? 0;
let currentQ=progressData[key]?.currentQuestion ?? 0;

let total=correct+wrong;
let percent=total>0 ? Math.min(total,100) : 0;

card.innerHTML=`

<div class="card-title">${subject}</div>

<div class="card-sub">${locked?"🔒 Locked":"✅ Open"}</div>

${currentQ>0 ? `<div class="resume-text">▶ Resume Quiz</div>`:""}

<div class="progress-container">
<div class="progress-bar" style="width:${percent}%"></div>
</div>

<div class="progress-text">
✔ ${correct} | ❌ ${wrong} | 📄 ${attempted}
</div>

`;

if(!locked){

card.href=\`quiz.html?subject=\${encodeURIComponent(subject)}\`;

}else{

card.onclick=(e)=>{
e.preventDefault();
alert("🔒 Login and pay ₹99 to unlock all subjects.");
};

}

container.appendChild(card);

});

}

onAuthStateChanged(auth,async(user)=>{

if(user){

currentUser=user;
userId=user.uid;

loginBtn.style.display="none";
logoutBtn.style.display="inline-block";

userInfo.textContent=\`👋 \${user.email}\`;

const snap=await getDoc(doc(db,"users",user.uid));

if(user.email==="y3knishu@gmail.com"){
isPaid=true;
payBtn.style.display="none";
}
else if(snap.exists() && snap.data().isPaid){
isPaid=true;
payBtn.style.display="none";
}
else{
isPaid=false;
payBtn.style.display="inline-block";
}

renderSubjects();

}

else{

currentUser=null;
userInfo.textContent="🔐 Not logged in";

loginBtn.style.display="inline-block";
logoutBtn.style.display="none";

isPaid=false;

renderSubjects();

}

});

loginBtn.onclick=()=>{window.location.href="admin-login.html";};

logoutBtn.onclick=()=>{
signOut(auth).then(()=>{
alert("Logged out");
location.reload();
});
};

payBtn.onclick=function(){

if(!currentUser){
alert("Please login first");
return;
}

const options={
key:"rzp_live_S7e2qEXg0B5vrU",
amount:900,
currency:"INR",
name:"NEET PG / INICET PYQs",
description:"Unlock all subjects",
prefill:{email:currentUser.email},

handler:async function(response){

alert("✅ Payment Successful!");

await setDoc(doc(db,"users",userId),{
isPaid:true,
paymentId:response.razorpay_payment_id
},{merge:true});

isPaid=true;
payBtn.style.display="none";

renderSubjects();

},

theme:{color:"#3399cc"}
};

const rzp=new Razorpay(options);
rzp.open();

};

async function updateVisitCount(){

const today=new Date().toISOString().split("T")[0];

const lastVisit=localStorage.getItem("lastVisitDate");

if(lastVisit!==today){

const ref=doc(db,"visits",today);
const snap=await getDoc(ref);

if(snap.exists()){
await updateDoc(ref,{count:increment(1)});
}else{
await setDoc(ref,{count:1});
}

localStorage.setItem("lastVisitDate",today);
}

const ref=doc(db,"visits",today);

onSnapshot(ref,(snap)=>{
if(snap.exists()){
document.getElementById("visitCounter").textContent="👀 Visitors Today: "+snap.data().count;
}
});

}

updateVisitCount();

</script>

<style>

.progress-container{
width:90%;
height:6px;
background:rgba(255,255,255,0.3);
border-radius:10px;
margin-top:10px;
overflow:hidden;
}

.progress-bar{
height:100%;
background:#00ff88;
transition:width 0.4s;
}

.progress-text{
font-size:12px;
margin-top:4px;
}

.resume-text{
font-size:13px;
font-weight:bold;
margin-top:6px;
color:#00ffd5;
}

.visit-number{
text-align:left;
font-size:18px;
margin-top:20px;
}

</style>

</body>
</html>
