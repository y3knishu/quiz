<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NEET PG / INICET PYQs</title>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>

body{
font-family:Arial;
background:#f5f7fb;
margin:0;
padding:20px;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

h1{
margin:0;
}

#subjects{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:20px;
}

.card{
padding:20px;
border-radius:12px;
color:white;
text-decoration:none;
position:relative;
}

.locked{
opacity:0.5;
}

.progress-container{
background:rgba(255,255,255,0.3);
height:6px;
border-radius:10px;
margin-top:10px;
overflow:hidden;
}

.progress-bar{
height:100%;
background:#00ff9c;
}

.stats{
font-size:13px;
margin-top:6px;
}

.resume{
font-size:12px;
margin-top:4px;
}

button{
padding:6px 10px;
cursor:pointer;
}

</style>

</head>

<body>

<header>

<h1>NEET PG / INICET PYQs</h1>

<div>

<span id="user"></span>

<button id="loginBtn">Login</button>
<button id="logoutBtn">Logout</button>

<button id="payBtn">Unlock All ₹99</button>

</div>

</header>

<p>🔓 Anatomy is free. Login + Pay ₹99 to unlock all subjects.</p>

<div id="subjects"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {

apiKey:"AIzaSyAMNDoNuqkWfXEGYdwueJb5XTr1ST2ztKc",
authDomain:"mcqs-96117.firebaseapp.com",
projectId:"mcqs-96117",
storageBucket:"mcqs-96117.appspot.com",
messagingSenderId:"352256319143",
appId:"1:352256319143:web:74b2bd062a7f2dc5f1c582"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const subjects = [

"Anatomy","Physiology","Biochemistry","Pathology","Pharmacology",
"Microbiology","Forensic Medicine","Community Medicine","ENT",
"Ophthalmology","General Medicine","General Surgery",
"Obstetrics & Gynaecology","Pediatrics","Orthopaedics",
"Dermatology","Psychiatry","Radiology","Anesthesiology"

];

const colors=[
"#ff6b6b","#6bcB77","#4d96ff","#ffd93d",
"#9d4edd","#00c2a8","#ff9671","#0081cf"
];

let userId=null;
let isPaid=false;

const subjectsDiv=document.getElementById("subjects");

function randomColor(){
return colors[Math.floor(Math.random()*colors.length)];
}

async function renderSubjects(){

subjectsDiv.innerHTML="";

let progressData={};

if(userId){

const snap=await getDoc(doc(db,"user_progress",userId));

if(snap.exists()){
progressData=snap.data();
}

}

subjects.forEach(subject=>{

const card=document.createElement("a");

card.className="card";
card.style.background=randomColor();

const key="progress_"+subject;

let attempted=0;
let correct=0;
let wrong=0;
let total=29;

if(progressData[key]){

attempted=progressData[key].attempted || 0;
correct=progressData[key].correct || 0;
wrong=progressData[key].wrong || 0;
total=progressData[key].total || 29;

}

let percent=(attempted/total)*100;
if(percent>100) percent=100;

const locked=(subject!=="Anatomy" && !isPaid);

if(locked){
card.classList.add("locked");
}

card.innerHTML=

"<h3>"+subject+"</h3>"+

"<div class='progress-container'>"+
"<div class='progress-bar' style='width:"+percent+"%'></div>"+
"</div>"+

"<div class='stats'>Correct "+correct+" | Wrong "+wrong+" | Attempted "+attempted+"</div>"+

(attempted>0 ? "<div class='resume'>▶ Resume Quiz</div>" : "");

if(!locked){

card.href="quiz.html?subject="+encodeURIComponent(subject);

}else{

card.onclick=(e)=>{
e.preventDefault();
alert("Login and purchase to unlock");
};

}

subjectsDiv.appendChild(card);

});

}

onAuthStateChanged(auth,async(user)=>{

if(user){

userId=user.uid;

document.getElementById("user").textContent="Hello "+user.email;

document.getElementById("loginBtn").style.display="none";
document.getElementById("logoutBtn").style.display="inline";

const snap=await getDoc(doc(db,"users",userId));

if(snap.exists() && snap.data().isPaid){
isPaid=true;
document.getElementById("payBtn").style.display="none";
}

}else{

document.getElementById("user").textContent="Not logged in";

document.getElementById("loginBtn").style.display="inline";
document.getElementById("logoutBtn").style.display="none";

}

renderSubjects();

});

document.getElementById("logoutBtn").onclick=()=>{
signOut(auth);
};

document.getElementById("loginBtn").onclick=()=>{
window.location="admin-login.html";
};

</script>

</body>
</html>
